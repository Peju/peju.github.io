<!DOCTYPE html>
<html>
<head>
	<title>Register Page</title> 

	<meta charset="utf-8">
	<meta name="language" content="english"> 
	<meta http-equiv="content-type" content="text/html">
	<meta name="author" content="Peter Jough">
	<meta name="designer" content="Peter Jough">
	<meta name="viewport" content="width=device-width, maximum-scale=1.0">
	<meta name="description" content="A register design for IS218 - Yong Zhao">
	<meta name="keywords" content="Peter Jough, NJIT, bis, web design, yong zhao, is218">

	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
	<link href='https://fonts.googleapis.com/css?family=Raleway' rel='stylesheet' type='text/css'>

	<link rel="icon" type="image/x-icon" href="favicon.ico"/>
	<link rel="stylesheet" type="text/css" href="register.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
</head>
<body>
	<section>
		<img class = "bgt" src = "boatblur.jpg">
			<div class = "registerbox">
				<p class = "registertext">Welcome to IS218</p>
					<p class = "welcometext">Register below
					<i class="fa fa-pencil" aria-hidden="true"></i>
					</p>
						<div class="form-group boxmove">
							<label for="usr" class = "labeltext">Name:</label>
							<input type="text" class="form-control boxsize" id="usr">
						</div>
						<div class="form-group boxmove">
							 <label for="usr" class = "labeltext">Last Name:</label>
							 <input type="usr" class="form-control boxsize" id="usr">
						</div>
						<div class="form-group boxmove">
							<label for="usr" class = "labeltext">Email:</label>
							<input type="text" class="form-control boxsize" id="usr">
						</div>
						<div class="form-group boxmove">
							 <label for="usr" class = "labeltext">Phone Number:</label>
							 <input type="usr" class="form-control boxsize" id="usr">
						</div>
						<div class="form-group boxmove">
							 <label for="usr" class = "labeltext">Birthday (XX/XX/XXXX):</label>
							 <input type="usr" class="form-control boxsize" id="usr">
						</div>
						<label for="pwd" class = "labeltext boxmove">Gender:</label><br>
						<label class="radio-inline labeltext boxgender"><input type="radio" name="optradio">Male</label><br>
						<label class="radio-inline labeltext boxgender"><input type="radio" name="optradio">Female</label>
						<br><br>	
						<div class = "boxmove">
							<button type="button" class="btn btn-primary">Finish</button>
						</div>
					</div>
					
			</div>	
	</section>
<script>
//jquery 
function main() {
  $('.bgt').hide();
  $('.bgt').fadeIn(2200);
  
  $('.projects').hide();
  
  $('.projects-button').on('click', function() {
		$(this).next().slideToggle(400);
    $(this).toggleClass('active');
    $(this).text('Projects Viewed');
	});
}
$(document).ready(main);
</script>
</body>
</html>
